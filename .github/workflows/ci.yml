name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: monet_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/monet_test
      ENCRYPTION_KEY: ZmVkY2JhOTg3NjU0MzIxMGZlZGNiYTk4NzY1NDMyMTA=
      PLATFORM_ADMIN_SECRET: ci-test-secret
      TURBO_TELEMETRY_DISABLED: 1
      RUN_PERF: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && (contains(github.event.pull_request.title, '[perf]') || contains(join(github.event.pull_request.labels.*.name, ','), 'perf'))) }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run repository CI checks
        env:
          MONET_CI_MANAGED_DB: "1"
        run: pnpm ci:local

      - name: Setup k6
        if: env.RUN_PERF == 'true'
        uses: grafana/setup-k6-action@v1

      - name: Build API server for load tests
        if: env.RUN_PERF == 'true'
        run: |
          rm -rf apps/api/dist
          pnpm --filter @monet/api build

      - name: Start API server for load tests
        if: env.RUN_PERF == 'true'
        run: |
          RATE_LIMIT_MAX=100000 \
          API_PORT=3001 \
          pnpm --filter @monet/api start >/tmp/monet-api.log 2>&1 &
          echo $! >/tmp/monet-api.pid
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3001/health/live >/dev/null; then
              echo "API server ready for load tests"
              exit 0
            fi
            sleep 1
          done
          echo "API server failed to become ready"
          cat /tmp/monet-api.log
          exit 1

      - name: Validate authenticated API route mount
        if: env.RUN_PERF == 'true'
        run: |
          probe_url="http://127.0.0.1:3001/api/tenants/test-slug/groups"
          status=$(curl -sS -D /tmp/monet-api-groups-headers.txt -o /tmp/monet-api-groups-body.txt -w "%{http_code}" "$probe_url")
          content_type=$(tr -d '\r' </tmp/monet-api-groups-headers.txt | awk -F': ' 'tolower($1)=="content-type" {print tolower($2)}')

          if [ "$status" = "404" ] && printf "%s" "$content_type" | grep -q "text/plain"; then
            echo "Route mount probe hit a plain-text 404 at $probe_url (likely stale build artifact)"
            cat /tmp/monet-api-groups-body.txt
            exit 1
          fi

          if ! printf "%s" "$content_type" | grep -q "application/json"; then
            echo "Expected $probe_url response to be JSON, got status $status with Content-Type: ${content_type:-<missing>}"
            cat /tmp/monet-api-groups-body.txt
            exit 1
          fi

      - name: Seed load test data
        if: env.RUN_PERF == 'true'
        run: |
          LOAD_SEED_FILE=/tmp/monet-load-seed.json \
          API_BASE_URL=http://127.0.0.1:3001 \
          LOAD_GROUP_COUNT=2 \
          LOAD_AGENT_COUNT=10 \
          LOAD_MEMORIES_PER_GROUP=1000 \
          pnpm --filter @monet/api test:load:seed

      - name: Load test gate
        if: env.RUN_PERF == 'true'
        run: |
          LOAD_SEED_FILE=/tmp/monet-load-seed.json \
          API_BASE_URL=http://127.0.0.1:3001 \
          LOAD_DURATION=30s \
          LOAD_VUS=10 \
          pnpm --filter @monet/api test:load

      - name: Stop API server after load tests
        if: always() && env.RUN_PERF == 'true'
        run: |
          if [ -f /tmp/monet-api.pid ]; then
            kill $(cat /tmp/monet-api.pid) || true
          fi

      - name: Print API server log on perf failure
        if: failure() && env.RUN_PERF == 'true'
        run: |
          if [ -f /tmp/monet-api.log ]; then
            cat /tmp/monet-api.log
          fi
