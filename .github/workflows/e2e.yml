name: E2E Tests

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/dashboard/**"
      - "packages/**"
      - "docker-compose.dev.yml"
      - ".github/workflows/e2e.yml"
  push:
    branches: [main]
    paths:
      - "apps/dashboard/**"
      - "packages/**"
      - "docker-compose.dev.yml"
      - ".github/workflows/e2e.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: monet_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/monet_e2e
      ENCRYPTION_KEY: ZmVkY2JhOTg3NjU0MzIxMGZlZGNiYTk4NzY1NDMyMTA=
      AUTH_SECRET: ci-e2e-auth-secret-minimum-32-chars-long!
      DEV_BYPASS_AUTH: "true"
      E2E_TENANT_SLUG: test-org
      E2E_BASE_URL: http://127.0.0.1:3000
      E2E_API_URL: http://127.0.0.1:3001

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @monet/dashboard exec playwright install --with-deps chromium

      - name: Build workspace packages
        run: pnpm build

      - name: Run database migrations
        run: pnpm --filter @monet/db migrate

      - name: Seed E2E test data
        run: |
          # Seed the platform installation, test-org tenant, and default groups for E2E tests
          pnpm --filter @monet/dashboard exec tsx ./scripts/seed-test-data.ts

      - name: Start API server
        run: |
          API_PORT=3001 \
          RATE_LIMIT_MAX=100000 \
          pnpm --filter @monet/api start >/tmp/monet-api.log 2>&1 &
          echo $! >/tmp/monet-api.pid
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3001/health/live >/dev/null; then
              echo "API server ready for E2E tests"
              exit 0
            fi
            sleep 1
          done
          echo "API server failed to become ready"
          cat /tmp/monet-api.log
          exit 1

      - name: Start Dashboard
        run: |
          PORT=3000 \
          DEV_BYPASS_AUTH=true \
          DASHBOARD_LOCAL_AUTH=true \
          INTERNAL_API_URL=http://127.0.0.1:3001 \
          pnpm --filter @monet/dashboard dev:local >/tmp/monet-dashboard.log 2>&1 &
          echo $! >/tmp/monet-dashboard.pid
          for i in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              echo "Dashboard ready for E2E tests"
              exit 0
            fi
            sleep 1
          done
          echo "Dashboard failed to become ready"
          cat /tmp/monet-dashboard.log
          exit 1

      - name: Run Playwright E2E tests
        working-directory: apps/dashboard
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/dashboard/e2e-report/
          retention-days: 14

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/dashboard/e2e-artifacts/
          retention-days: 14

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: |
            apps/dashboard/e2e-artifacts/**/*.png
            apps/dashboard/e2e-report/**/*.png
          retention-days: 14

      - name: Print API server log on failure
        if: failure()
        run: |
          if [ -f /tmp/monet-api.log ]; then
            echo "=== API Server Log ==="
            tail -100 /tmp/monet-api.log
          fi

      - name: Print Dashboard log on failure
        if: failure()
        run: |
          if [ -f /tmp/monet-dashboard.log ]; then
            echo "=== Dashboard Log ==="
            tail -100 /tmp/monet-dashboard.log
          fi

      - name: Stop services
        if: always()
        run: |
          if [ -f /tmp/monet-api.pid ]; then kill $(cat /tmp/monet-api.pid) || true; fi
          if [ -f /tmp/monet-dashboard.pid ]; then kill $(cat /tmp/monet-dashboard.pid) || true; fi
