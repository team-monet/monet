name: Bug report
description: Report a reproducible problem in Monet
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Monet.

        Please do **not** use public issues for security vulnerabilities.
        Use private reporting instead: https://github.com/team-monet/monet/security/advisories/new
  - type: checkboxes
    id: safety
    attributes:
      label: Security check
      options:
        - label: I confirm this is **not** a security vulnerability report.
          required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
      placeholder: Describe the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Provide a minimal set of steps we can follow.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or traces
      description: Paste relevant output and screenshots. Redact secrets.
      render: shell
  - type: input
    id: version
    attributes:
      label: Monet version
      description: Tag/commit/branch if known.
      placeholder: e.g. v0.4.0, main@abc123
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime, and setup context.
      placeholder: |
        - OS:
        - Node.js:
        - pnpm:
        - Deployment mode (local/runtime/k8s):
    validations:
      required: true
