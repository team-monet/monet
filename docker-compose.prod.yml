x-monet-api-env: &monet_api_env
  DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-monet}
  PLATFORM_ADMIN_SECRET: ${PLATFORM_ADMIN_SECRET:-monet-local-admin-secret}
  ENRICHMENT_PROVIDER: ${ENRICHMENT_PROVIDER:-ollama}
  ENRICHMENT_API_KEY: ${ENRICHMENT_API_KEY:-}
  EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
  API_PORT: ${API_PORT:-3001}
  AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-90}
  RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
  RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}

services:
  postgres:
    image: pgvector/pgvector:pg16
    hostname: postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monet}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      default:
        aliases:
          - postgres

  migrate:
    image: monet-api:local
    build:
      context: .
      dockerfile: docker/monet.Dockerfile
      target: api-runtime
    depends_on:
      postgres:
        condition: service_healthy
    environment: *monet_api_env
    command:
      - sh
      - -lc
      - >
        until node -e "require('node:dns').lookup('postgres', (error) => process.exit(error ? 1 : 0))"; do
          sleep 1;
        done;
        pnpm db:migrate
    restart: "no"

  api:
    image: monet-api:local
    build:
      context: .
      dockerfile: docker/monet.Dockerfile
      target: api-runtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment: *monet_api_env
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${API_PORT:-3001}/health/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  dashboard:
    image: monet-dashboard:local
    build:
      context: .
      dockerfile: docker/monet.Dockerfile
      target: dashboard-runtime
    restart: unless-stopped
    profiles: ["dashboard"]
    depends_on:
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-monet}
      INTERNAL_API_URL: http://api:${API_PORT:-3001}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:${DASHBOARD_PORT:-3310}}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-monet-local-nextauth-secret}
      AUTH_TRUST_HOST: "true"
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      DEV_BYPASS_AUTH: ${DEV_BYPASS_AUTH:-true}
      DASHBOARD_LOCAL_AUTH: ${DASHBOARD_LOCAL_AUTH:-true}
      LOCAL_TENANT_NAME: ${LOCAL_TENANT_NAME:-Local Dev Org}
    ports:
      - "${DASHBOARD_PORT:-3310}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

volumes:
  postgres_prod_data:
