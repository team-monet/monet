services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monet}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  api:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: >-
      sh -lc "corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @monet/api build &&
      pnpm --filter @monet/api start"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-monet}
      PLATFORM_ADMIN_SECRET: ${PLATFORM_ADMIN_SECRET:?PLATFORM_ADMIN_SECRET must be set}
      ENRICHMENT_PROVIDER: ${ENRICHMENT_PROVIDER:-ollama}
      ENRICHMENT_API_KEY: ${ENRICHMENT_API_KEY:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      API_PORT: ${API_PORT:-3001}
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-90}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - ./:/app
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

volumes:
  postgres_prod_data:
