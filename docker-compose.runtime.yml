x-monet-api-env: &monet_api_env
  DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-monet}
  ENRICHMENT_PROVIDER: ${ENRICHMENT_PROVIDER:-ollama}
  ENRICHMENT_API_KEY: ${ENRICHMENT_API_KEY:-}
  EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama-shared:11434}
  OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen2.5:7b}
  OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-qwen3-embedding:4b}
  API_PORT: ${API_PORT:-4301}
  AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-90}
  RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
  RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}

services:
  postgres:
    image: pgvector/pgvector:pg16
    hostname: postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-65432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monet_runtime}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_runtime_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      default:
        aliases:
          - postgres

  migrate:
    image: ${MIGRATE_IMAGE:-monet-migrate:local}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-monet_runtime}
    command:
      - sh
      - -lc
      - >
        until node -e "require('node:dns').lookup('postgres', (error) => process.exit(error ? 1 : 0))"; do
          sleep 1;
        done;
        node packages/db/dist/migrate.js
    restart: "no"

  api:
    image: ${API_IMAGE:-monet-api:local}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment: *monet_api_env
    ports:
      - "${API_PORT:-4301}:${API_PORT:-4301}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${API_PORT:-4301}/health/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    networks:
      - default
      - shared

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    command:
      - start-dev
      - --http-port=8080
      - --hostname-strict=false
    ports:
      - "${KEYCLOAK_PORT:-4400}:8080"
    volumes:
      - keycloak_runtime_data:/opt/keycloak/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  dashboard:
    image: ${DASHBOARD_IMAGE:-monet-dashboard:local}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-monet_runtime}
      INTERNAL_API_URL: http://api:${API_PORT:-4301}
      API_PORT: ${API_PORT:-4301}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-}
      MCP_PUBLIC_URL: ${MCP_PUBLIC_URL:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:${DASHBOARD_PORT:-4310}}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-monet-runtime-nextauth-secret}
      LOCAL_OIDC_BASE_URL: ${LOCAL_OIDC_BASE_URL:-http://keycloak.localhost:${KEYCLOAK_PORT:-4400}}
      AUTH_TRUST_HOST: "true"
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      DEV_BYPASS_AUTH: ${DEV_BYPASS_AUTH:-false}
      DASHBOARD_LOCAL_AUTH: ${DASHBOARD_LOCAL_AUTH:-false}
      LOCAL_TENANT_NAME: ${LOCAL_TENANT_NAME:-Runtime Org}
    ports:
      - "${DASHBOARD_PORT:-4310}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    extra_hosts:
      - "keycloak.localhost:host-gateway"

volumes:
  postgres_runtime_data:
  keycloak_runtime_data:

networks:
  shared:
    external: true
    name: ${MONET_SHARED_NETWORK:-monet-shared}
