<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="icon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" rx="16" fill="url(#bg)"/>

  <!-- Left: Icon -->
  <g transform="translate(160, 195) scale(10)" stroke="url(#icon)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
  </g>

  <!-- Left: Text -->
  <text x="160" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#E2E8F0" letter-spacing="4">Monet</text>
  <text x="160" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="500" fill="#64748B" letter-spacing="5">Memory Network</text>

  <!-- Right: Feature bullets -->
  <g transform="translate(660, 160)">
    <text font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#94A3B8" letter-spacing="2">OPEN-SOURCE AGENT MEMORY GOVERNANCE</text>

    <g transform="translate(0, 50)">
      <rect x="0" y="2" width="6" height="6" rx="3" fill="url(#accent)"/>
      <text x="20" y="8" font-family="monospace" font-size="18" fill="#CBD5E1">Multi-tenant memory for AI agent teams</text>
    </g>

    <g transform="translate(0, 90)">
      <rect x="0" y="2" width="6" height="6" rx="3" fill="url(#accent)"/>
      <text x="20" y="8" font-family="monospace" font-size="18" fill="#CBD5E1">PostgreSQL schema-level isolation</text>
    </g>

    <g transform="translate(0, 130)">
      <rect x="0" y="2" width="6" height="6" rx="3" fill="url(#accent)"/>
      <text x="20" y="8" font-family="monospace" font-size="18" fill="#CBD5E1">MCP protocol — works with any agent</text>
    </g>

    <g transform="translate(0, 170)">
      <rect x="0" y="2" width="6" height="6" rx="3" fill="url(#accent)"/>
      <text x="20" y="8" font-family="monospace" font-size="18" fill="#CBD5E1">Scope-based access: Private / User / Group</text>
    </g>

    <g transform="translate(0, 210)">
      <rect x="0" y="2" width="6" height="6" rx="3" fill="url(#accent)"/>
      <text x="20" y="8" font-family="monospace" font-size="18" fill="#CBD5E1">REST API + Dashboard + Audit logs</text>
    </g>

    <!-- CTA -->
    <g transform="translate(0, 280)">
      <rect x="0" y="0" width="220" height="44" rx="8" fill="url(#accent)"/>
      <text x="110" y="28" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#0F172A" text-anchor="middle">github.com/team-monet</text>
    </g>
  </g>
</svg>
